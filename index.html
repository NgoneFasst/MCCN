<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Page de test</title>
</head>
<body>
  <h1 data-cy="titre">Bienvenue !</h1>

  <form>
    <input 
      type="text" 
      placeholder="Nom d'utilisateur" 
      data-cy="champ-username" 
    />
    <input 
      type="password" 
      placeholder="Mot de passe" 
      data-cy="champ-password" 
    />
    <button type="submit" data-cy="btn-connexion">
      Se connecter
    </button>
  </form>

  <p id="message" data-cy="message-erreur" style="display:none; color:red;">
    Identifiants incorrects !
  </p>

</body>
</html>
